code: mob
name: "GOMAD"
description: "GOMAD module bundling curated skills, agents, rules, and hooks from the user's Claude Code environment"
default_selected: false

# Configuration prompts
skill_preset:
  prompt:
    - "Which skill preset would you like to install?"
  default: "full-stack"
  result: "{value}"
  single-select:
    - value: "full"
      label: "Full - All 142 skills, every agent and hook"
    - value: "full-stack"
      label: "Full Stack - TypeScript, Python, frontend, backend, DB (~50 skills)"
    - value: "python-only"
      label: "Python Only - Python patterns, Django, testing (~15 skills)"
    - value: "enterprise"
      label: "Enterprise - All languages + healthcare + supply chain (~100 skills)"
    - value: "lean"
      label: "Lean - Core coding standards, TDD, code review, security (~20 skills)"
    - value: "enhanced"
      label: "Enhanced - 16 project agents + complementary skills (~25 skills)"

install_global_assets:
  prompt:
    - "Install global assets (rules, hooks, commands) to ~/.claude/?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - Install rules, hooks, and commands globally"
    - value: "no"
      label: "No - Only install project-scoped BMAD module"

# Directories to create during installation
directories:
  - "{output_folder}/mob"

# Post-install notes
post_install_notes:
  - condition:
      key: install_global_assets
      value: "yes"
    message: |
      Global assets installed to ~/.claude/
      Run `gomad status` to see what was installed.
      Run `gomad uninstall --global` to rollback.
  - condition:
      key: install_global_assets
      value: "no"
    message: |
      Global assets were NOT installed.
      Run `gomad install --global-only` later to add them.
